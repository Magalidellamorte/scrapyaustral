  /notifications:
    get:
      summary: Obtener notificaciones del usuario
      tags:
        - notifications
      description: |
        Devuelve la lista de notificaciones del usuario autenticado, ordenadas por fecha de creación (más recientes primero).

        **¿Cuándo se crean las notificaciones?**
        - Las notificaciones se generan automáticamente en el backend cuando ocurren eventos importantes en la plataforma, como:
          - Cuando un usuario se postula a un anuncio, el dueño del anuncio recibe una notificación.
          - Cuando una postulación es aceptada o rechazada, el usuario que se postuló recibe una notificación.
          - Cuando una postulación es cancelada o finalizada, los usuarios involucrados reciben notificaciones.
          - Cuando se crea una nueva oferta, los usuarios interesados pueden recibir notificaciones.
          - Cuando un usuario realiza una pregunta sobre una oferta, el dueño recibe una notificación.
          - Cuando un torky es asignado o completa un retiro, se notifican los usuarios correspondientes.
        - Técnicamente, estas notificaciones se crean en los controladores del backend (por ejemplo, `OfferController`, `PostulationController`) usando el servicio `ExpoNotification`, que guarda el registro en la base de datos y, si corresponde, envía una notificación push al dispositivo del usuario.

        **¿Cómo funciona este endpoint internamente?**
        1. El cliente hace una petición GET a `/notifications`.
        2. La ruta está definida en `backend/routes/api.php` y apunta al método `index` del controlador `NotificationController` (`backend/app/Http/Controllers/NotificationController.php`).
        3. El controlador obtiene las notificaciones del usuario autenticado usando la relación `notifications` del modelo `User`.
        4. Se retorna un JSON con la lista de notificaciones.
        5. Cada notificación es un registro en la tabla `notifications` de la base de datos.

        **Notas:**
        - Las notificaciones se generan automáticamente cuando ocurren eventos importantes (por ejemplo, una oferta aceptada, un mensaje nuevo, etc.).
        - El backend utiliza la clase `ExpoNotification` para enviar notificaciones push y guardar el registro en la base de datos.

      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: Token de autenticación Bearer.
      responses:
        '200':
          description: Listado de notificaciones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Unauthorized"
      x-explanation: |
        **Flujo completo del endpoint /notifications:**
        - El cliente envía una petición GET.
        - El backend obtiene las notificaciones del usuario autenticado desde la base de datos.
        - Se devuelven todas las notificaciones ordenadas por fecha.
        - Si el usuario no está autenticado, responde 401.

  /notifications/read_all:
