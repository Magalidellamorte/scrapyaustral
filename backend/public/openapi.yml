openapi: 3.0.3
info:
  title: Scrapy API
  version: 0.1.0
  description: >-
    Especificación inicial de la API para visualización en Swagger UI.
    Esta especificación será extendida por los issues de la épica SCR-416.
servers:
  - url: http://localhost:8000/api
    description: Entorno local (Docker / php artisan serve)
paths:
  /offers:
    get:
      summary: Obtener lista de anuncios
      description: >-
        Devuelve una lista paginada de anuncios filtrable por múltiples criterios.
        Permite filtrar por categorías, estados, tipos, condiciones, búsqueda por texto,
        mostrar solo anuncios propios o de otros usuarios, y aplicar filtros específicos
        para usuarios tipo "torky".
      tags:
        - offers
      security:
        - bearerAuth: [ ]
      parameters:
        - name: own
          in: query
          description: >-
            Filtrar anuncios propios o de otros usuarios.
            "true" = solo anuncios del usuario autenticado,
            "false" = solo anuncios de otros usuarios
          schema:
            type: string
            enum: [ true, false ]
          example: "false"
        - name: view
          in: query
          description: >-
            Vista especial. "last_offers" excluye anuncios del usuario autenticado
          schema:
            type: string
            enum: [ last_offers ]
          example: "last_offers"
        - name: categories
          in: query
          description: Lista de IDs de categorías separados por coma
          schema:
            type: string
          example: "1,2,3"
        - name: offerTypes
          in: query
          description: Lista de IDs de tipos de oferta separados por coma
          schema:
            type: string
          example: "1,2"
        - name: offerStatuses
          in: query
          description: Lista de IDs de estados de oferta separados por coma
          schema:
            type: string
          example: "1,2,3"
        - name: conditions
          in: query
          description: Lista de IDs de condiciones separados por coma
          schema:
            type: string
          example: "1,2"
        - name: search
          in: query
          description: Término de búsqueda para filtrar por título o descripción
          schema:
            type: string
          example: "cartón reciclable"
        - name: page
          in: query
          description: Número de página para paginación
          schema:
            type: integer
            minimum: 1
          example: 1
        - name: limit
          in: query
          description: Número de elementos por página (solo para usuarios torky)
          schema:
            type: integer
          example: 1000
      responses:
        '200':
          description: Lista de anuncios obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaginatedOffers'
              examples:
                example_success:
                  value:
                    - current_page: 1
                      data:
                        - id: 1
                          title: "Vendo cartón en buen estado"
                          description: "Cartón limpio y seco, ideal para reciclaje"
                          quantity: "50"
                          user_id: 123
                          category_id: 1
                          offer_type_id: 1
                          offer_status_id: 1
                          condition_id: 1
                          measure_type_id: 2
                          value_with_shipping: "500"
                          value_without_shipping: "400"
                          pick_by_scraper: true
                          send_by_client: false
                          valid_until: "2024-02-15T10:30:00Z"
                          created_at: "2024-01-15T10:30:00Z"
                          updated_at: "2024-01-15T10:30:00Z"
                          user:
                            id: 123
                            first_name: "Juan"
                            last_name: "Pérez"
                            full_name: "Juan Pérez"
                            type: "scraper"
                          category:
                            id: 1
                            name: "Cartón"
                          offer_type:
                            id: 1
                            name: "Vender"
                          offer_status:
                            id: 1
                            name: "Pendiente"
                          condition:
                            id: 1
                            name: "Nuevo"
                          measure_type:
                            id: 2
                            name: "Kilogramos"
                          address:
                            street: "Av. Corrientes 1234"
                            neighborhood: "San Nicolás"
                            city: "Buenos Aires"
                            province: "Buenos Aires"
                          images:
                            - id: 1
                              path: "images/offer/1/xyz123.jpg"
                              bytes: 245760
                          postulations: [ ]
                          rating: [ ]
                      first_page_url: "http://localhost:8000/api/offers?page=1"
                      from: 1
                      last_page: 3
                      last_page_url: "http://localhost:8000/api/offers?page=3"
                      next_page_url: "http://localhost:8000/api/offers?page=2"
                      path: "http://localhost:8000/api/offers"
                      per_page: 15
                      prev_page_url: null
                      to: 15
                      total: 45
        '401':
          description: No autorizado - Token inválido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Error de validación en parámetros
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /offers/{id}:
    get:
      summary: Obtener anuncio específico
      description: >-
        Devuelve los detalles completos de un anuncio específico incluyendo
        sus relaciones (categorías, usuario, imágenes, postulaciones, etc.).
      tags:
        - offers
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          description: ID único del anuncio
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Anuncio obtenido exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Offer'
              examples:
                example_success:
                  value:
                    id: 1
                    title: "Vendo cartón en buen estado"
                    description: "Cartón limpio y seco, ideal para reciclaje"
                    quantity: "50"
                    user_id: 123
                    category_id: 1
                    offer_type_id: 1
                    offer_status_id: 1
                    condition_id: 1
                    measure_type_id: 2
                    value_with_shipping: "500"
                    value_without_shipping: "400"
                    pick_by_scraper: true
                    send_by_client: false
                    valid_until: "2024-02-15T10:30:00Z"
                    created_at: "2024-01-15T10:30:00Z"
                    updated_at: "2024-01-15T10:30:00Z"
                    user:
                      id: 123
                      first_name: "Juan"
                      last_name: "Pérez"
                      full_name: "Juan Pérez"
                      type: "scraper"
                    category:
                      id: 1
                      name: "Cartón"
                    offer_type:
                      id: 1
                      name: "Vender"
                    offer_status:
                      id: 1
                      name: "Pendiente"
                    condition:
                      id: 1
                      name: "Nuevo"
                    measure_type:
                      id: 2
                      name: "Kilogramos"
                    address:
                      street: "Av. Corrientes 1234"
                      neighborhood: "San Nicolás"
                      city: "Buenos Aires"
                      province: "Buenos Aires"
                    images:
                      - id: 1
                        path: "images/offer/1/xyz123.jpg"
                        bytes: 245760
                    offer_categories:
                      - id: 1
                        name: "Cartón"
                        pivot:
                          measure_type_id: 2
                          quantity: 50
                          condition_id: 1
                    torkies:
                      - id: 1
                        user_id: 456
                        offer_id: 1
                        expected_start_pickup_at: "2024-01-20T08:00:00Z"
                        expected_end_pickup_at: "2024-01-20T10:00:00Z"
                        user:
                          id: 456
                          first_name: "María"
                          last_name: "García"
                          type: "torky"
                    postulations: [ ]
                    rating: [ ]
        '401':
          description: No autorizado - Token inválido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Anuncio no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                not_found:
                  value:
                    message: "No query results for model [App\\Models\\Offer] 1"

  /offers/{offer}/close:
    post:
      summary: Cerrar un anuncio
      description: >-
        Permite al propietario de un anuncio cerrarlo, especificando un motivo.
        Al cerrar un anuncio, todas las postulaciones pendientes o aceptadas
        son rechazadas automáticamente y se notifica a los postulantes.
      tags:
        - offers
      security:
        - bearerAuth: [ ]
      parameters:
        - name: offer
          in: path
          required: true
          description: ID del anuncio a cerrar
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reasonId
              properties:
                reasonId:
                  type: integer
                  description: ID del motivo de cierre (ver /closed_reasons)
                  example: 1
            examples:
              example_request:
                value:
                  reasonId: 1
      responses:
        '200':
          description: Anuncio cerrado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              examples:
                success:
                  value:
                    success: true
                    message: "¡Anuncio cerrado correctamente!"
        '400':
          description: Error - El anuncio ya está cerrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                already_closed:
                  value:
                    success: false
                    message: "El anuncio ya ha sido finalizado"
        '401':
          description: No autorizado - Token inválido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Prohibido - Solo el propietario puede cerrar el anuncio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Anuncio no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /offers/{offer}/ask_question:
    post:
      summary: Hacer una pregunta sobre un anuncio
      description: >-
        Permite a un usuario autenticado hacer una pregunta sobre un anuncio.
        Solo se permite una pregunta por usuario por anuncio. Si el usuario
        ya hizo una pregunta, debe usar el chat para preguntas adicionales.
        Se crea un mensaje destacado en el chat y se notifica al propietario.
      tags:
        - offers
      security:
        - bearerAuth: [ ]
      parameters:
        - name: offer
          in: path
          required: true
          description: ID del anuncio sobre el que se pregunta
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - question
              properties:
                question:
                  type: string
                  description: Texto de la pregunta
                  maxLength: 1000
                  example: "¿El cartón está completamente limpio? ¿Incluye transporte?"
            examples:
              example_request:
                value:
                  question: "¿El cartón está completamente limpio? ¿Incluye transporte?"
      responses:
        '200':
          description: Pregunta creada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              examples:
                success:
                  value:
                    success: true
                    message: "Tu consulta se ha creado correctamente"
        '400':
          description: Error - El usuario ya hizo una pregunta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                already_asked:
                  value:
                    success: false
                    message: "¡Si tienes mas preguntas puedes usar el chat!"
        '401':
          description: No autorizado - Token inválido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Anuncio no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    post:
      summary: Crear un nuevo anuncio
      description: >-
        Permite crear un nuevo anuncio de material reciclable. Incluye validación
        completa de datos, manejo de imágenes múltiples con redimensionamiento automático,
        creación de dirección con datos geográficos dinámicos, y notificaciones
        automáticas a usuarios interesados en la categoría.
      tags:
        - offers
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - offer_type_id
                - category_id
                - condition_id
                - title
                - description
                - quantity
                - measure_type_id
                - address[street]
                - address[street_number]
              properties:
                offer_type_id:
                  type: integer
                  description: ID del tipo de oferta (ver /offer_types)
                  example: 1
                category_id:
                  type: integer
                  description: ID de la categoría del material (ver /categories)
                  example: 1
                condition_id:
                  type: integer
                  description: ID de la condición del material (ver /conditions)
                  example: 1
                title:
                  type: string
                  maxLength: 255
                  description: Título del anuncio
                  example: "Vendo cartón en excelente estado"
                description:
                  type: string
                  maxLength: 2000
                  description: Descripción detallada del material
                  example: "Cartón limpio y seco, ideal para reciclaje. Proveniente de embalajes de productos electrónicos."
                quantity:
                  type: string
                  maxLength: 2000
                  description: Cantidad disponible del material
                  example: "50"
                measure_type_id:
                  type: integer
                  description: ID del tipo de medida (ver /measure_types)
                  example: 2
                value_with_shipping:
                  type: integer
                  description: Precio con envío (opcional, solo para ofertas de venta)
                  example: 500
                value_without_shipping:
                  type: integer
                  description: Precio sin envío (opcional, solo para ofertas de venta)
                  example: 400
                pick_by_scraper:
                  type: string
                  enum: [ true, false ]
                  description: Si el scraper puede recoger el material
                  example: "true"
                pick_by_donor:
                  type: string
                  enum: [ true, false ]
                  description: Si el donante puede enviar el material
                  example: "false"
                address[street]:
                  type: string
                  maxLength: 255
                  description: Nombre de la calle
                  example: "Av. Corrientes"
                address[street_number]:
                  type: string
                  maxLength: 255
                  description: Número de la dirección
                  example: "1234"
                address[postal_code]:
                  type: string
                  maxLength: 255
                  description: Código postal (opcional)
                  example: "C1043AAZ"
                address[floor]:
                  type: string
                  maxLength: 255
                  description: Piso (opcional)
                  example: "2"
                address[apartment]:
                  type: string
                  maxLength: 255
                  description: Departamento (opcional)
                  example: "A"
                address[latitude]:
                  type: number
                  format: float
                  description: Latitud geográfica (opcional)
                  example: -34.6037389
                address[longitude]:
                  type: number
                  format: float
                  description: Longitud geográfica (opcional)
                  example: -58.3837591
                address[province]:
                  type: string
                  description: Nombre de la provincia (se crea automáticamente si no existe)
                  example: "Buenos Aires"
                address[city]:
                  type: string
                  description: Nombre de la ciudad (se crea automáticamente si no existe)
                  example: "Buenos Aires"
                address[neighborhood]:
                  type: string
                  description: Nombre del barrio (se crea automáticamente si no existe)
                  example: "San Nicolás"
                images[0]:
                  type: string
                  format: binary
                  description: Primera imagen del anuncio (opcional)
                images[1]:
                  type: string
                  format: binary
                  description: Segunda imagen del anuncio (opcional)
                images[2]:
                  type: string
                  format: binary
                  description: Tercera imagen del anuncio (opcional)
            examples:
              example_venta:
                summary: Anuncio de venta
                value:
                  offer_type_id: 1
                  category_id: 1
                  condition_id: 1
                  title: "Vendo cartón en excelente estado"
                  description: "Cartón limpio y seco, ideal para reciclaje"
                  quantity: "50"
                  measure_type_id: 2
                  value_with_shipping: 500
                  value_without_shipping: 400
                  pick_by_scraper: "true"
                  pick_by_donor: "false"
                  address[street]: "Av. Corrientes"
                  address[street_number]: "1234"
                  address[province]: "Buenos Aires"
                  address[city]: "Buenos Aires"
                  address[neighborhood]: "San Nicolás"
              example_donacion:
                summary: Anuncio de donación
                value:
                  offer_type_id: 2
                  category_id: 3
                  condition_id: 2
                  title: "Dono plásticos varios"
                  description: "Botellas de plástico limpias y tapitas"
                  quantity: "20"
                  measure_type_id: 1
                  pick_by_scraper: "true"
                  pick_by_donor: "false"
                  address[street]: "San Martín"
                  address[street_number]: "567"
                  address[province]: "Córdoba"
                  address[city]: "Córdoba"
      responses:
        '200':
          description: Anuncio creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              examples:
                success:
                  value:
                    success: true
                    message: "Publicaciòn creada correctamente"
        '401':
          description: No autorizado - Token inválido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                unauthorized:
                  value:
                    message: "Unauthenticated."
        '422':
          description: Error de validación en los datos enviados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
              examples:
                validation_error:
                  value:
                    message: "The given data was invalid."
                    errors:
                      title:
                        - "The title field is required."
                      category_id:
                        - "The selected category id is invalid."
                      address.street:
                        - "The address.street field is required."
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                server_error:
                  value:
                    message: "Internal server error during image processing or email notification"

  /offer_types:
    get:
      summary: Lista de tipos de oferta
      description: Devuelve la lista de tipos de oferta disponibles.
      tags:
        - offers
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OfferType'
              examples:
                ejemplo:
                  value:
                    - id: 1
                      name: Vender
                      enabled: '1'
                    - id: 2
                      name: Donar
                      enabled: '1'

  /auth/register:
    post:
      summary: Registro de usuario
      tags:
        - auth
      description: |
        Registra un nuevo usuario en la plataforma.

        **¿Cómo funciona este endpoint internamente?**
        1. El cliente envía los datos requeridos por POST a `/auth/register`.
        2. La ruta está definida en `backend/routes/api.php` y apunta a un método del controlador `AuthController` en `backend/app/Http/Controllers/Auth/AuthController.php`.
        3. Antes de llegar al controlador, los datos pasan por una clase de validación ubicada en `backend/app/Http/Requests/`.
        4. Si los datos son válidos, el controlador crea un nuevo usuario usando el modelo `User` (`backend/app/Models/User.php`).
        5. El usuario se guarda en la base de datos y se puede enviar un email de bienvenida.
        6. El backend responde con un JSON de éxito o error.

      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - user_type
                - first_name
                - last_name
                - email
                - password
                - whatsapp
              properties:
                user_type:
                  type: string
                  example: hogar
                first_name:
                  type: string
                  example: Juan
                last_name:
                  type: string
                  example: Pérez
                email:
                  type: string
                  format: email
                  example: juan@example.com
                password:
                  type: string
                  format: password
                  example: secret123
                whatsapp:
                  type: string
                  example: "+5491122334455"
                company_title:
                  type: string
                  example: "Mi Empresa S.A."
                player_id:
                  type: string
                  example: "expoPushToken123"
      responses:
        '201':
          description: Usuario creado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "¡Usuario creado correctamente!"
        '400':
          description: Error de validación
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Hubo un error al crear el usuario. Por favor, inténtelo nuevamente."
        '422':
          description: Error de validación de campos
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "The given data was invalid."
                  errors:
                    type: object
      x-explanation: |
        **Flujo completo del endpoint /auth/register:**
        - El cliente (por ejemplo, la app mobile) envía los datos del usuario.
        - Laravel valida los datos usando una clase en `app/Http/Requests/`.
        - Si todo es correcto, el controlador (`AuthController`) crea el usuario con el modelo `User`.
        - El usuario se guarda en la base de datos (MySQL/PostgreSQL, según configuración en `backend/config/database.php`).
        - Se responde con un mensaje de éxito o error.
        - Si ocurre un error de validación, se responde con código 422 y detalles de los errores.

  /auth/login:
    post:
      summary: Login de usuario
      tags:
        - auth
      description: |
        Autentica un usuario y retorna un token de acceso.

        **¿Cómo funciona este endpoint internamente?**
        1. El cliente envía email y password por POST a `/auth/login`.
        2. La ruta está definida en `backend/routes/api.php` y apunta a un método del controlador `AuthController` en `backend/app/Http/Controllers/Auth/AuthController.php`.
        3. Antes de llegar al controlador, los datos pasan por una clase de validación ubicada en `backend/app/Http/Requests/`.
        4. El controlador intenta autenticar al usuario usando el modelo `User` y el sistema de autenticación de Laravel.
        5. Si las credenciales son correctas, se genera un token de acceso y se retorna al cliente.
        6. Si las credenciales son incorrectas, se responde con error 401.

      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: juan@example.com
                password:
                  type: string
                  format: password
                  example: secret123
                player_id:
                  type: string
                  example: "expoPushToken123"
                remember_me:
                  type: boolean
                  example: false
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                    example: Bearer
                  expires_at:
                    type: string
                    format: date-time
        '401':
          description: Credenciales inválidas
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Unauthorized"
        '422':
          description: Error de validación de campos
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "The given data was invalid."
                  errors:
                    type: object
      x-explanation: |
        **Flujo completo del endpoint /auth/login:**
        - El cliente envía email y password.
        - Laravel valida los datos usando una clase en `app/Http/Requests/`.
        - El controlador (`AuthController`) intenta autenticar al usuario.
        - Si es exitoso, se genera un token de acceso (usando Passport o Sanctum, según configuración) y se retorna al cliente.
        - Si las credenciales son incorrectas, se responde con error 401.
        - Si hay errores de validación, se responde con código 422 y detalles de los errores.

  /offers:
    get:
      summary: Obtener listado de ofertas
      tags:
        - offers
      description: |
        Devuelve un listado paginado de ofertas (anuncios) según los filtros y el tipo de usuario.

        **¿Cómo funciona este endpoint internamente?**
        1. El cliente hace una petición GET a `/offers`.
        2. La ruta está definida en `backend/routes/api.php` y apunta al método `index` del controlador `OfferController` (`backend/app/Http/Controllers/OfferController.php`).
        3. El controlador utiliza el modelo `Offer` (`backend/app/Models/Offer.php`) y el filtro `OfferFilter` (`backend/app/ModelFilters/OfferFilter.php`) para aplicar los filtros recibidos por query params.
        4. Se obtienen las ofertas desde la base de datos, se aplican relaciones y paginación.
        5. Se retorna un JSON con la lista de ofertas y metadatos de paginación.

      parameters:
        - in: query
          name: own
          schema:
            type: string
            enum: [true, false]
          description: Si es 'true', devuelve solo las ofertas del usuario autenticado.
        - in: query
          name: offer_type_id
          schema:
            type: integer
          description: Filtrar por tipo de oferta.
        - in: query
          name: category_id
          schema:
            type: integer
          description: Filtrar por categoría.
        - in: query
          name: condition_id
          schema:
            type: integer
          description: Filtrar por condición.
        - in: query
          name: search
          schema:
            type: string
          description: Buscar por título o descripción.
        - in: query
          name: page
          schema:
            type: integer
          description: Número de página para paginación.
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: Token de autenticación Bearer.
      responses:
        '200':
          description: Listado de ofertas paginado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Offer'
                  meta:
                    type: object
                    description: Metadatos de paginación
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Unauthorized"
      x-explanation: |
        **Flujo completo del endpoint /offers:**
        - El cliente envía una petición GET con los filtros deseados.
        - El backend aplica los filtros usando el filtro `OfferFilter` y el modelo `Offer`.
        - Se obtienen las ofertas desde la base de datos y se devuelven paginadas.
        - Si el usuario no está autenticado, se responde con 401.

    post:
      summary: Crear una nueva oferta (anuncio)
      tags:
        - offers
      description: |
        Permite a un usuario crear una nueva oferta (anuncio) en la plataforma. Se pueden adjuntar imágenes y se deben enviar varios datos obligatorios.

        **Gestión de imágenes:**
        - Existe una entidad (modelo y tabla) llamada `Image` en el backend, que representa cada imagen asociada a una oferta.
        - Cada oferta puede tener varias imágenes, y esta relación se gestiona en la base de datos (relación uno a muchos entre Offer e Image).
        - Cuando un usuario sube imágenes al crear una oferta, los archivos de imagen se almacenan localmente en la carpeta `storage/app/public` del proyecto.
        - En la base de datos solo se guarda la ruta (path) y metadatos de la imagen, no el archivo en sí.
        - Las imágenes quedan accesibles desde la carpeta pública del proyecto y no se almacenan directamente en la base de datos.

        **¿Cómo funciona este endpoint internamente?**
        1. El cliente envía los datos requeridos por POST a `/offers` (incluyendo imágenes si corresponde).
        2. La ruta está definida en `backend/routes/api.php` y apunta al método `store` del controlador `OfferController` (`backend/app/Http/Controllers/OfferController.php`).
        3. Antes de llegar al controlador, los datos pasan por la clase de validación `CreateOfferRequest` (`backend/app/Http/Requests/CreateOfferRequest.php`).
        4. Si los datos son válidos, el controlador crea un nuevo registro en la tabla `offers` usando el modelo `Offer` (`backend/app/Models/Offer.php`).
        5. Se crean las relaciones con categorías, dirección, imágenes, etc.
        6. Se envía una notificación y un email.
        7. El backend responde con un JSON de éxito o error.

      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - offer_type_id
                - category_id
                - condition_id
                - title
                - description
                - quantity
                - measure_type_id
                - address.street
                - address.street_number
              properties:
                offer_type_id:
                  type: integer
                  example: 1
                category_id:
                  type: integer
                  example: 2
                condition_id:
                  type: integer
                  example: 1
                title:
                  type: string
                  example: "Cartón para reciclar"
                description:
                  type: string
                  example: "Cartón limpio, listo para retirar."
                quantity:
                  type: string
                  example: "10"
                measure_type_id:
                  type: integer
                  example: 1
                value_with_shipping:
                  type: integer
                  example: 1000
                value_without_shipping:
                  type: integer
                  example: 800
                pick_by_scraper:
                  type: boolean
                  example: true
                send_by_donor:
                  type: boolean
                  example: false
                address.street:
                  type: string
                  example: "Av. Siempre Viva"
                address.street_number:
                  type: string
                  example: "742"
                address.postal_code:
                  type: string
                  example: "1000"
                address.floor:
                  type: string
                  example: "1"
                address.apartment:
                  type: string
                  example: "A"
                images:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Imágenes adjuntas (opcional)
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: Token de autenticación Bearer.
      responses:
        '201':
          description: Oferta creada correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Publicaciòn creada correctamente"
        '400':
          description: Error de validación o negocio
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Hubo un error al crear la publicación. Por favor, inténtelo nuevamente."
        '422':
          description: Error de validación de campos
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "The given data was invalid."
                  errors:
                    type: object
      x-explanation: |
        **Flujo completo del endpoint /offers (POST):**
        - El cliente envía los datos del anuncio y las imágenes.
        - Laravel valida los datos usando la clase `CreateOfferRequest`.
        - El controlador (`OfferController`) crea el anuncio y sus relaciones (categoría, dirección, imágenes).
        - Se guarda todo en la base de datos.
        - Se envía una notificación y un email.
        - Se responde con un mensaje de éxito o error.
        - Si ocurre un error de validación, se responde con código 422 y detalles de los errores.

  /offers/{offerId}:
    get:
      summary: Obtener detalle de una oferta
