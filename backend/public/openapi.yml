openapi: 3.0.3
info:
  title: Scrapy API
  version: 0.1.0
  description: >-
    Especificación inicial de la API para visualización en Swagger UI.
    Esta especificación será extendida por los issues de la épica SCR-416.
servers:
  - url: http://localhost:8000/api
    description: Entorno local (Docker / php artisan serve)
paths:
  /offers:
    get:
      summary: Obtener lista de anuncios
      description: >-
        Devuelve una lista paginada de anuncios filtrable por múltiples criterios.
        Permite filtrar por categorías, estados, tipos, condiciones, búsqueda por texto,
        mostrar solo anuncios propios o de otros usuarios, y aplicar filtros específicos
        para usuarios tipo "torky".
      tags:
        - offers
      security:
        - bearerAuth: []
      parameters:
        - name: own
          in: query
          description: >-
            Filtrar anuncios propios o de otros usuarios.
            "true" = solo anuncios del usuario autenticado,
            "false" = solo anuncios de otros usuarios
          schema:
            type: string
            enum: [true, false]
          example: "false"
        - name: view
          in: query
          description: >-
            Vista especial. "last_offers" excluye anuncios del usuario autenticado
          schema:
            type: string
            enum: [last_offers]
          example: "last_offers"
        - name: categories
          in: query
          description: Lista de IDs de categorías separados por coma
          schema:
            type: string
          example: "1,2,3"
        - name: offerTypes
          in: query
          description: Lista de IDs de tipos de oferta separados por coma
          schema:
            type: string
          example: "1,2"
        - name: offerStatuses
          in: query
          description: Lista de IDs de estados de oferta separados por coma
          schema:
            type: string
          example: "1,2,3"
        - name: conditions
          in: query
          description: Lista de IDs de condiciones separados por coma
          schema:
            type: string
          example: "1,2"
        - name: search
          in: query
          description: Término de búsqueda para filtrar por título o descripción
          schema:
            type: string
          example: "cartón reciclable"
        - name: page
          in: query
          description: Número de página para paginación
          schema:
            type: integer
            minimum: 1
          example: 1
        - name: limit
          in: query
          description: Número de elementos por página (solo para usuarios torky)
          schema:
            type: integer
          example: 1000
      responses:
        '200':
          description: Lista de anuncios obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaginatedOffers'
              examples:
                example_success:
                  value:
                    - current_page: 1
                      data:
                        - id: 1
                          title: "Vendo cartón en buen estado"
                          description: "Cartón limpio y seco, ideal para reciclaje"
                          quantity: "50"
                          user_id: 123
                          category_id: 1
                          offer_type_id: 1
                          offer_status_id: 1
                          condition_id: 1
                          measure_type_id: 2
                          value_with_shipping: "500"
                          value_without_shipping: "400"
                          pick_by_scraper: true
                          send_by_client: false
                          valid_until: "2024-02-15T10:30:00Z"
                          created_at: "2024-01-15T10:30:00Z"
                          updated_at: "2024-01-15T10:30:00Z"
                          user:
                            id: 123
                            first_name: "Juan"
                            last_name: "Pérez"
                            full_name: "Juan Pérez"
                            type: "scraper"
                          category:
                            id: 1
                            name: "Cartón"
                          offer_type:
                            id: 1
                            name: "Vender"
                          offer_status:
                            id: 1
                            name: "Pendiente"
                          condition:
                            id: 1
                            name: "Nuevo"
                          measure_type:
                            id: 2
                            name: "Kilogramos"
                          address:
                            street: "Av. Corrientes 1234"
                            neighborhood: "San Nicolás"
                            city: "Buenos Aires"
                            province: "Buenos Aires"
                          images:
                            - id: 1
                              path: "images/offer/1/xyz123.jpg"
                              bytes: 245760
                          postulations: []
                          rating: []
                      first_page_url: "http://localhost:8000/api/offers?page=1"
                      from: 1
                      last_page: 3
                      last_page_url: "http://localhost:8000/api/offers?page=3"
                      next_page_url: "http://localhost:8000/api/offers?page=2"
                      path: "http://localhost:8000/api/offers"
                      per_page: 15
                      prev_page_url: null
                      to: 15
                      total: 45
        '401':
          description: No autorizado - Token inválido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                unauthorized:
                  value:
                    message: "Unauthenticated."
        '422':
          description: Error de validación en parámetros
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

      /offers/{id}:
        get:
          summary: Obtener anuncio específico
          description: >-
            Devuelve los detalles completos de un anuncio específico incluyendo
            sus relaciones (categorías, usuario, imágenes, postulaciones, etc.).
          tags:
            - offers
          security:
            - bearerAuth: []
          parameters:
            - name: id
              in: path
              required: true
              description: ID único del anuncio
              schema:
                type: integer
              example: 1
          responses:
            '200':
              description: Anuncio obtenido exitosamente
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/Offer'
                  examples:
                    example_success:
                      value:
                        id: 1
                        title: "Vendo cartón en buen estado"
                        description: "Cartón limpio y seco, ideal para reciclaje"
                        quantity: "50"
                        user_id: 123
                        category_id: 1
                        offer_type_id: 1
                        offer_status_id: 1
                        condition_id: 1
                        measure_type_id: 2
                        value_with_shipping: "500"
                        value_without_shipping: "400"
                        pick_by_scraper: true
                        send_by_client: false
                        valid_until: "2024-02-15T10:30:00Z"
                        created_at: "2024-01-15T10:30:00Z"
                        updated_at: "2024-01-15T10:30:00Z"
                        user:
                          id: 123
                          first_name: "Juan"
                          last_name: "Pérez"
                          full_name: "Juan Pérez"
                          type: "scraper"
                        category:
                          id: 1
                          name: "Cartón"
                        offer_type:
                          id: 1
                          name: "Vender"
                        offer_status:
                          id: 1
                          name: "Pendiente"
                        condition:
                          id: 1
                          name: "Nuevo"
                        measure_type:
                          id: 2
                          name: "Kilogramos"
                        address:
                          street: "Av. Corrientes 1234"
                          neighborhood: "San Nicolás"
                          city: "Buenos Aires"
                          province: "Buenos Aires"
                        images:
                          - id: 1
                            path: "images/offer/1/xyz123.jpg"
                            bytes: 245760
                        offer_categories:
                          - id: 1
                            name: "Cartón"
                            pivot:
                              measure_type_id: 2
                              quantity: 50
                              condition_id: 1
                        torkies:
                          - id: 1
                            user_id: 456
                            offer_id: 1
                            expected_start_pickup_at: "2024-01-20T08:00:00Z"
                            expected_end_pickup_at: "2024-01-20T10:00:00Z"
                            user:
                              id: 456
                              first_name: "María"
                              last_name: "García"
                              type: "torky"
                        postulations: []
                        rating: []
            '401':
              description: No autorizado - Token inválido o ausente
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/Error'
            '404':
              description: Anuncio no encontrado
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/Error'
                  examples:
                    not_found:
                      value:
                        message: "No query results for model [App\\Models\\Offer] 1"

      /offers/{offer}/close:
        post:
          summary: Cerrar un anuncio
          description: >-
            Permite al propietario de un anuncio cerrarlo, especificando un motivo.
            Al cerrar un anuncio, todas las postulaciones pendientes o aceptadas
            son rechazadas automáticamente y se notifica a los postulantes.
          tags:
            - offers
          security:
            - bearerAuth: []
          parameters:
            - name: offer
              in: path
              required: true
              description: ID del anuncio a cerrar
              schema:
                type: integer
              example: 1
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  required:
                    - reasonId
                  properties:
                    reasonId:
                      type: integer
                      description: ID del motivo de cierre (ver /closed_reasons)
                      example: 1
                examples:
                  example_request:
                    value:
                      reasonId: 1
          responses:
            '200':
              description: Anuncio cerrado exitosamente
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/SuccessResponse'
                  examples:
                    success:
                      value:
                        success: true
                        message: "¡Anuncio cerrado correctamente!"
            '400':
              description: Error - El anuncio ya está cerrado
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorResponse'
                  examples:
                    already_closed:
                      value:
                        success: false
                        message: "El anuncio ya ha sido finalizado"
            '401':
              description: No autorizado - Token inválido o ausente
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/Error'
            '403':
              description: Prohibido - Solo el propietario puede cerrar el anuncio
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/Error'
            '404':
              description: Anuncio no encontrado
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/Error'

      /offers/{offer}/ask_question:
        post:
          summary: Hacer una pregunta sobre un anuncio
          description: >-
            Permite a un usuario autenticado hacer una pregunta sobre un anuncio.
            Solo se permite una pregunta por usuario por anuncio. Si el usuario
            ya hizo una pregunta, debe usar el chat para preguntas adicionales.
            Se crea un mensaje destacado en el chat y se notifica al propietario.
          tags:
            - offers
          security:
            - bearerAuth: []
          parameters:
            - name: offer
              in: path
              required: true
              description: ID del anuncio sobre el que se pregunta
              schema:
                type: integer
              example: 1
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  required:
                    - question
                  properties:
                    question:
                      type: string
                      description: Texto de la pregunta
                      maxLength: 1000
                      example: "¿El cartón está completamente limpio? ¿Incluye transporte?"
                examples:
                  example_request:
                    value:
                      question: "¿El cartón está completamente limpio? ¿Incluye transporte?"
          responses:
            '200':
              description: Pregunta creada exitosamente
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/SuccessResponse'
                  examples:
                    success:
                      value:
                        success: true
                        message: "Tu consulta se ha creado correctamente"
            '400':
              description: Error - El usuario ya hizo una pregunta
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorResponse'
                  examples:
                    already_asked:
                      value:
                        success: false
                        message: "¡Si tienes mas preguntas puedes usar el chat!"
            '401':
              description: No autorizado - Token inválido o ausente
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/Error'
            '404':
              description: Anuncio no encontrado
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/Error'
            '422':
              description: Error de validación
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ValidationError'
    post:
      summary: Crear un nuevo anuncio
      description: >-
        Permite crear un nuevo anuncio de material reciclable. Incluye validación
        completa de datos, manejo de imágenes múltiples con redimensionamiento automático,
        creación de dirección con datos geográficos dinámicos, y notificaciones
        automáticas a usuarios interesados en la categoría.
      tags:
        - offers
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - offer_type_id
                - category_id
                - condition_id
                - title
                - description
                - quantity
                - measure_type_id
                - address[street]
                - address[street_number]
              properties:
                offer_type_id:
                  type: integer
                  description: ID del tipo de oferta (ver /offer_types)
                  example: 1
                category_id:
                  type: integer
                  description: ID de la categoría del material (ver /categories)
                  example: 1
                condition_id:
                  type: integer
                  description: ID de la condición del material (ver /conditions)
                  example: 1
                title:
                  type: string
                  maxLength: 255
                  description: Título del anuncio
                  example: "Vendo cartón en excelente estado"
                description:
                  type: string
                  maxLength: 2000
                  description: Descripción detallada del material
                  example: "Cartón limpio y seco, ideal para reciclaje. Proveniente de embalajes de productos electrónicos."
                quantity:
                  type: string
                  maxLength: 2000
                  description: Cantidad disponible del material
                  example: "50"
                measure_type_id:
                  type: integer
                  description: ID del tipo de medida (ver /measure_types)
                  example: 2
                value_with_shipping:
                  type: integer
                  description: Precio con envío (opcional, solo para ofertas de venta)
                  example: 500
                value_without_shipping:
                  type: integer
                  description: Precio sin envío (opcional, solo para ofertas de venta)
                  example: 400
                pick_by_scraper:
                  type: string
                  enum: [true, false]
                  description: Si el scraper puede recoger el material
                  example: "true"
                pick_by_donor:
                  type: string
                  enum: [true, false]
                  description: Si el donante puede enviar el material
                  example: "false"
                address[street]:
                  type: string
                  maxLength: 255
                  description: Nombre de la calle
                  example: "Av. Corrientes"
                address[street_number]:
                  type: string
                  maxLength: 255
                  description: Número de la dirección
                  example: "1234"
                address[postal_code]:
                  type: string
                  maxLength: 255
                  description: Código postal (opcional)
                  example: "C1043AAZ"
                address[floor]:
                  type: string
                  maxLength: 255
                  description: Piso (opcional)
                  example: "2"
                address[apartment]:
                  type: string
                  maxLength: 255
                  description: Departamento (opcional)
                  example: "A"
                address[latitude]:
                  type: number
                  format: float
                  description: Latitud geográfica (opcional)
                  example: -34.6037389
                address[longitude]:
                  type: number
                  format: float
                  description: Longitud geográfica (opcional)
                  example: -58.3837591
                address[province]:
                  type: string
                  description: Nombre de la provincia (se crea automáticamente si no existe)
                  example: "Buenos Aires"
                address[city]:
                  type: string
                  description: Nombre de la ciudad (se crea automáticamente si no existe)
                  example: "Buenos Aires"
                address[neighborhood]:
                  type: string
                  description: Nombre del barrio (se crea automáticamente si no existe)
                  example: "San Nicolás"
                images[0]:
                  type: string
                  format: binary
                  description: Primera imagen del anuncio (opcional)
                images[1]:
                  type: string
                  format: binary
                  description: Segunda imagen del anuncio (opcional)
                images[2]:
                  type: string
                  format: binary
                  description: Tercera imagen del anuncio (opcional)
            examples:
              example_venta:
                summary: Anuncio de venta
                value:
                  offer_type_id: 1
                  category_id: 1
                  condition_id: 1
                  title: "Vendo cartón en excelente estado"
                  description: "Cartón limpio y seco, ideal para reciclaje"
                  quantity: "50"
                  measure_type_id: 2
                  value_with_shipping: 500
                  value_without_shipping: 400
                  pick_by_scraper: "true"
                  pick_by_donor: "false"
                  address[street]: "Av. Corrientes"
                  address[street_number]: "1234"
                  address[province]: "Buenos Aires"
                  address[city]: "Buenos Aires"
                  address[neighborhood]: "San Nicolás"
              example_donacion:
                summary: Anuncio de donación
                value:
                  offer_type_id: 2
                  category_id: 3
                  condition_id: 2
                  title: "Dono plásticos varios"
                  description: "Botellas de plástico limpias y tapitas"
                  quantity: "20"
                  measure_type_id: 1
                  pick_by_scraper: "true"
                  pick_by_donor: "false"
                  address[street]: "San Martín"
                  address[street_number]: "567"
                  address[province]: "Córdoba"
                  address[city]: "Córdoba"
      responses:
        '200':
          description: Anuncio creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              examples:
                success:
                  value:
                    success: true
                    message: "Publicaciòn creada correctamente"
        '401':
          description: No autorizado - Token inválido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                unauthorized:
                  value:
                    message: "Unauthenticated."
        '422':
          description: Error de validación en los datos enviados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
              examples:
                validation_error:
                  value:
                    message: "The given data was invalid."
                    errors:
                      title:
                        - "The title field is required."
                      category_id:
                        - "The selected category id is invalid."
                      address.street:
                        - "The address.street field is required."
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                server_error:
                  value:
                    message: "Internal server error during image processing or email notification"

  /offer_types:
    get:
      summary: Lista de tipos de oferta
      description: Devuelve la lista de tipos de oferta disponibles.
      tags:
        - offers
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OfferType'
              examples:
                ejemplo:
                  value:
                    - id: 1
                      name: Vender
                      enabled: '1'
                    - id: 2
                      name: Donar
                      enabled: '1'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token de autenticación JWT obtenido del endpoint /auth/login

  schemas:
    Offer:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "Vendo cartón en buen estado"
        description:
          type: string
          nullable: true
          example: "Cartón limpio y seco, ideal para reciclaje"
        quantity:
          type: string
          nullable: true
          example: "50"
        user_id:
          type: integer
          example: 123
        category_id:
          type: integer
          nullable: true
          example: 1
        offer_type_id:
          type: integer
          nullable: true
          example: 1
        offer_status_id:
          type: integer
          nullable: true
          example: 1
        condition_id:
          type: integer
          nullable: true
          example: 1
        measure_type_id:
          type: integer
          nullable: true
          example: 2
        value_with_shipping:
          type: string
          nullable: true
          example: "500"
        value_without_shipping:
          type: string
          nullable: true
          example: "400"
        pick_by_scraper:
          type: boolean
          example: true
        send_by_client:
          type: boolean
          example: false
        valid_until:
          type: string
          format: date-time
          nullable: true
          example: "2024-02-15T10:30:00Z"
        torky_pickup_at:
          type: string
          format: date
          nullable: true
          example: "2024-01-20"
        torky_pickup_range:
          type: string
          nullable: true
          example: "8 a 10"
        closed_reason_id:
          type: integer
          nullable: true
          example: null
        created_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        user:
          $ref: '#/components/schemas/User'
        category:
          $ref: '#/components/schemas/Category'
        offer_type:
          $ref: '#/components/schemas/OfferType'
        offer_status:
          $ref: '#/components/schemas/OfferStatus'
        condition:
          $ref: '#/components/schemas/Condition'
        measure_type:
          $ref: '#/components/schemas/MeasureType'
        address:
          $ref: '#/components/schemas/Address'
        images:
          type: array
          items:
            $ref: '#/components/schemas/Image'
        offer_categories:
          type: array
          items:
            $ref: '#/components/schemas/CategoryWithPivot'
        torkies:
          type: array
          items:
            $ref: '#/components/schemas/OfferTorky'
        postulations:
          type: array
          items:
            $ref: '#/components/schemas/Postulation'
        rating:
          type: array
          items:
            $ref: '#/components/schemas/Rating'

    PaginatedOffers:
      type: object
      properties:
        current_page:
          type: integer
          example: 1
        data:
          type: array
          items:
            $ref: '#/components/schemas/Offer'
        first_page_url:
          type: string
          example: "http://localhost:8000/api/offers?page=1"
        from:
          type: integer
          example: 1
        last_page:
          type: integer
          example: 3
        last_page_url:
          type: string
          example: "http://localhost:8000/api/offers?page=3"
        next_page_url:
          type: string
          nullable: true
          example: "http://localhost:8000/api/offers?page=2"
        path:
          type: string
          example: "http://localhost:8000/api/offers"
        per_page:
          type: integer
          example: 15
        prev_page_url:
          type: string
          nullable: true
          example: null
        to:
          type: integer
          example: 15
        total:
          type: integer
          example: 45

    User:
      type: object
      properties:
        id:
          type: integer
          example: 123
        first_name:
          type: string
          example: "Juan"
        last_name:
          type: string
          example: "Pérez"
        full_name:
          type: string
          example: "Juan Pérez"
        email:
          type: string
          format: email
          example: "juan.perez@email.com"
        type:
          type: string
          enum: [scraper, hogar, torky, admin_localidad]
          example: "scraper"
        phone:
          type: string
          nullable: true
          example: "+54911234567"

    Category:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Cartón"
        enabled:
          type: boolean
          example: true

    CategoryWithPivot:
      allOf:
        - $ref: '#/components/schemas/Category'
        - type: object
          properties:
            pivot:
              type: object
              properties:
                measure_type_id:
