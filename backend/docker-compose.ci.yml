services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER: scrapy
    container_name: scrapy-app-ci
    restart: unless-stopped
    working_dir: /var/www/scrapy
    volumes:
      - .:/var/www/scrapy
    networks:
      - scrapy-ci
    environment:
      - DB_HOST=db
      - DB_DATABASE=scrapy
      - DB_USERNAME=scrapy_admin
      - DB_PASSWORD=testpassword123

  nginx:
    image: nginx:1.21-alpine
    container_name: scrapy-nginx-ci
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/scrapy
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - scrapy-ci
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: scrapy-db-ci
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: scrapy
      MYSQL_ROOT_PASSWORD: testpassword123
      MYSQL_PASSWORD: testpassword123
      MYSQL_USER: scrapy_admin
    volumes:
      - ci_db_data:/var/lib/mysql
    networks:
      - scrapy-ci
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

networks:
  scrapy-ci:
    driver: bridge
volumes:
  ci_db_data:
