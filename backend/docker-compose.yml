services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER: scrapy
    container_name: scrapy-app
    restart: unless-stopped
    working_dir: /var/www/scrapy
    volumes:
      - .:/var/www/scrapy
    networks:
      - scrapy
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.21-alpine
    container_name: scrapy-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/scrapy
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - scrapy
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: scrapy-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-scrapy}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-testpassword123}
      MYSQL_PASSWORD: ${DB_PASSWORD:-testpassword123}
      MYSQL_USER: ${DB_USERNAME:-scrapy_admin}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - scrapy
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-testpassword123}"]
      timeout: 20s
      retries: 10
      interval: 10s

networks:
  scrapy:
    driver: bridge
volumes:
  db_data:
